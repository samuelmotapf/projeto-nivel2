        width: 30%;

        display: inline-block;

    div.seccao{
        background-color: orange;
    }
  </style>

</head>
<body>


    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
          <a class="navbar-brand" href="index.html">Início</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="index.html">Parte 1</a>
              </li>
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="receitas.html">Parte 2</a>

            </ul>

        </div>
      </nav>

      <br><br>
      <div class="seccao">
        <br><br>

        <center>
  <h1 class="h1">Usuários de Teste via REST</h1>

  <a href="https://reqres.in" target="_blank">reqres.in</a>
</center>

  <div id="usuarios" class="container-fluid">
    <div class="row">
      <div class="card col-4 p-2 m-3" v-for="(user, index) in users" :key="index">
        <img :src="user.avatar" class="card-img-top" alt="Imagem do Usuário">
        <div class="card-body">
          <h5 class="card-title">{{ user.first_name }} {{ user.last_name }}</h5>
          <p class="card-text">{{ user.email }}</p>
        </div>
      </div>
    </div>
  </div>


</div>

  <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <script>
    var app = new Vue({
      el: '#usuarios',
      data: {
        users: []
      },
      mounted() {
        this.loadUsers();
      },
      methods: {
        loadUsers() {
          $.ajax({
            url: 'https://reqres.in/api/users?per_page=10',
            method: 'GET',
            success: function(response) {
              app.users = response.data;
            },
            error: function(error) {
              console.log(error);
            }
          });
        }
      }
    });
  </script>
</body>
</html>
